# ─────────────────────────────────────────────
#  Docker Compose — Laravel + MySQL + Redis + Nginx
#  Dùng cho môi trường Development
# ─────────────────────────────────────────────
services:

  # ── Nginx reverse proxy ──
  nginx:
    image: nginx:1.27-alpine
    container_name: qlbh_nginx
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html:delegated
    depends_on:
      - app
    networks:
      - qlbh_network

  # ── PHP-FPM application ──
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: qlbh_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html:delegated
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - qlbh_network

  # ── MySQL 8.0 ──
  mysql:
    image: mysql:8.0
    container_name: qlbh_mysql
    ports:
      - "${DB_EXTERNAL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-doan_thuctap_cn}"
      MYSQL_USER: "${DB_USERNAME:-laravel}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qlbh_network

  # ── Redis 7 — Cache + Session + JWT Blacklist ──
  redis:
    image: redis:7-alpine
    container_name: qlbh_redis
    ports:
      - "${REDIS_EXTERNAL_PORT:-6380}:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qlbh_network

  # ── Node.js (Vite dev server) ──
  node:
    image: node:20-alpine
    container_name: qlbh_node
    working_dir: /var/www/html
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - ./:/var/www/html:delegated
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - qlbh_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  qlbh_network:
    driver: bridge
